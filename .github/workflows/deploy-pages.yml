name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/**"
      - "reports/**"
      - "notebooks/**"
      - "data/**"
      - "build_site.py"
      - "build_wasm.py"
      - "build_db.py"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync

      - name: Rebuild SQLite from data/
        run: uv run python build_db.py

      - name: Build static HTML site
        run: uv run python build_site.py

      - name: Build WASM notebook (Pyodide)
        run: uv run python build_wasm.py

      - uses: actions/configure-pages@v5
      - name: Upload site/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
