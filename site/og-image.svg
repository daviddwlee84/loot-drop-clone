<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0f14"/>
      <stop offset="1" stop-color="#1a1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5470"/>
      <stop offset="1" stop-color="#ff8a5b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="6" fill="url(#accent)"/>

  <!-- 墓碑 emoji 區 -->
  <text x="80" y="170" font-size="90">🪦</text>

  <!-- 標題 -->
  <text x="200" y="150" font-family="-apple-system, 'PingFang TC', sans-serif"
        font-size="64" font-weight="800" fill="#ffffff">Loot Drop 創業墳場</text>
  <text x="200" y="215" font-family="-apple-system, 'PingFang TC', sans-serif"
        font-size="38" font-weight="500" fill="#9aa4b2">失敗創業案例 · 資料分析</text>

  <!-- 數據卡 -->
  <g font-family="-apple-system, 'PingFang TC', sans-serif">
    <!-- card 1 -->
    <rect x="80" y="300" width="240" height="170" rx="16" fill="#161a23" stroke="#2a3140" stroke-width="2"/>
    <text x="200" y="385" font-size="58" font-weight="800" fill="#ff5470" text-anchor="middle">1,749</text>
    <text x="200" y="430" font-size="26" fill="#9aa4b2" text-anchor="middle">倒閉公司</text>

    <!-- card 2 -->
    <rect x="345" y="300" width="240" height="170" rx="16" fill="#161a23" stroke="#2a3140" stroke-width="2"/>
    <text x="465" y="385" font-size="58" font-weight="800" fill="#4dd0e1" text-anchor="middle">$535B</text>
    <text x="465" y="430" font-size="26" fill="#9aa4b2" text-anchor="middle">總燒掉資金</text>

    <!-- card 3 -->
    <rect x="610" y="300" width="240" height="170" rx="16" fill="#161a23" stroke="#2a3140" stroke-width="2"/>
    <text x="730" y="385" font-size="58" font-weight="800" fill="#ffb3c0" text-anchor="middle">3 年</text>
    <text x="730" y="430" font-size="26" fill="#9aa4b2" text-anchor="middle">存活中位數</text>

    <!-- card 4 -->
    <rect x="875" y="300" width="240" height="170" rx="16" fill="#161a23" stroke="#2a3140" stroke-width="2"/>
    <text x="995" y="385" font-size="58" font-weight="800" fill="#ff8a5b" text-anchor="middle">64%</text>
    <text x="995" y="430" font-size="24" fill="#9aa4b2" text-anchor="middle">IT 死於競爭</text>
  </g>

  <!-- 底部 -->
  <text x="80" y="560" font-family="ui-monospace, monospace"
        font-size="28" fill="#6b7280">Supabase 逆向 · 互動 notebook · IT 產業深度報告</text>
</svg>
